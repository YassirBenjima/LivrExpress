services:
  # PHP-FPM Application Service (Symfony)
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: livrexpress_app
    restart: unless-stopped
    volumes:
      - .:/var/www:rw
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/docker-php-config.ini:ro
    environment:
      DATABASE_URL: "mysql://${DB_USER:-root}:${DB_PASSWORD:-}@mysql:3306/${DB_NAME:-livrexpress}?serverVersion=${MYSQL_SERVER_VERSION:-8.0.32}&charset=${DB_CHARSET:-utf8mb4}"
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
    depends_on:
      - mysql
    networks:
      - symfony-network

  # Nginx Web Server Service
  nginx:
    image: nginx:alpine
    container_name: livrexpress_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www:rw
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - symfony-network

  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: livrexpress_mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME:-livrexpress}
      MYSQL_ALLOW_EMPTY_PASSWORD: ${MYSQL_ALLOW_EMPTY_PASSWORD:-yes}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
    volumes:
      - mysql_data:/var/lib/mysql:rw
    networks:
      - symfony-network

  # phpMyAdmin Service
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: livrexpress_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    depends_on:
      - mysql
    networks:
      - symfony-network

# Persistent Volumes
volumes:
  mysql_data:

# Docker Networks
networks:
  symfony-network:
    driver: bridge
